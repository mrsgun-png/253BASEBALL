<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>253 BASEBALL - DRIVE ACTION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Black+Han+Sans&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Black Han Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .login-container {
            width: 100%;
            max-width: 480px; /* 모바일 한손 조작 최적화 너비 */
            padding: 20px 15px;
            box-sizing: border-box;
            text-align: center;
            background: linear-gradient(rgba(11, 14, 20, 0.75), rgba(11, 14, 20, 0.9)), 
                        url('main.png') no-repeat center center; 
            background-size: cover;
            border: 3px solid #f2a900;
            border-radius: 12px;
            margin: 10px;
            box-shadow: 0 0 20px rgba(242, 169, 0, 0.3);
        }

        .main-title {
            font-size: 2.4rem; /* 모바일 화면에 맞춰 타이틀 축소 */
            color: #f2a900;
            text-shadow: 3px 3px 0px #4a154b, 5px 5px 0px #000;
            margin: 5px 0;
            letter-spacing: 1px;
        }

        .sub-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.0rem;
            color: #00bcd4;
            margin-bottom: 20px;
            text-shadow: 1px 1px 0px #000;
        }

        /* 📱 모바일 세로 배치 최적화 */
        .team-selection {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .team-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            transition: all 0.2s ease;
        }

        .team-card.team-a.selected {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.15);
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.3);
        }

        .team-card.team-b.selected {
            border-color: #0077b6;
            background: rgba(0, 119, 182, 0.15);
            box-shadow: 0 0 10px rgba(0, 119, 182, 0.3);
        }

        .team-logo {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .team-a .team-logo { background: linear-gradient(135deg, #ff6b35, #4a154b); color: #fff; border: 1px solid #fff; }
        .team-b .team-logo { background: linear-gradient(135deg, #0077b6, #f2a900); color: #fff; border: 1px solid #fff; }

        .team-info-wrap {
            flex-grow: 1;
        }

        .team-name-text {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .member-select {
            width: 100%;
            padding: 8px;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 0.95rem;
            background-color: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
        }

        .mission-section {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00bcd4;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: left;
        }
        .mission-section.active { display: block; }
        
        .mission-header {
            font-size: 0.95rem;
            color: #00bcd4;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* 📱 모바일 스크롤 리스트 최적화 (1열 배치로 가독성 확보) */
        .mission-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 2px;
        }
        
        .mission-item {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }
        .mission-item.selected {
            background: #ff4d4d;
            color: #fff;
            border-color: #fff;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.2rem;
            background: linear-gradient(#f2a900, #ff8c00);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0px #b37d00;
        }
        .start-btn:disabled {
            background: #444;
            color: #777;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="main-title">253 BASEBALL</div>
    <div class="sub-title">LET'S DRIVE SALES!</div>

    <div class="team-selection">
        <div class="team-card team-a" onclick="selectTeam('A')">
            <div class="team-logo">K</div>
            <div class="team-info-wrap">
                <div class="team-name-text">253 삼구삼진스</div>
                <select class="member-select" id="members-a" onclick="event.stopPropagation()" onchange="checkReady()">
                    <option value="">선수 선택</option>
                    <option value="성경">성경</option>
                    <option value="윤정">윤정</option>
                    <option value="정훈">정훈</option>
                    <option value="혜인">혜인</option>
                    <option value="선우">선우</option>
                </select>
            </div>
        </div>

        <div class="team-card team-b" onclick="selectTeam('B')">
            <div class="team-logo">L</div>
            <div class="team-info-wrap">
                <div class="team-name-text">코스 라이언즈</div>
                <select class="member-select" id="members-b" onclick="event.stopPropagation()" onchange="checkReady()">
                    <option value="">선수 선택</option>
                    <option value="주하">주하</option>
                    <option value="유진">유진</option>
                    <option value="지인">지인</option>
                    <option value="정환">정환</option>
                    <option value="채령">채령</option>
                </select>
            </div>
        </div>
    </div>

    <div class="mission-section" id="mission-section">
        <div class="mission-header">
            <span id="mission-instruction-title" style="font-weight:bold; color:#ff4d4d; font-size:0.85rem;">🔥 상대 미션 던지기</span>
            <span id="mission-count" style="font-size:0.85rem;">(0 / 5)</span>
        </div>
        <div class="mission-grid" id="mission-grid"></div>
    </div>

    <button class="start-btn" id="start-btn" onclick="enterGame()" disabled>팀과 선수를 선택하세요</button>
</div>

<script>
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/"; 
    let selectedTeam = null;
    let selectedMissions = [];
    let isMissionAlreadySet = false;

    const todayStr = new Date().toISOString().split('T')[0];

    const missionPool = [
        "아우터 판매 1건 달성", "니트 + 바지 세트 판매", "객단가 20만원 이상 달성",
        "신상품 피팅 유도 3회", "결제 시 멤버십 신규 가입 유도", "액세서리 추가 판매 성공",
        "단일 영수증 3PCS 이상 판매", "중요 존(Zone) 마네킹 디스플레이 정비", "린넨 셔츠 판매 1건",
        "오픈 직후 첫 마수걸이 판매", "고객 칭찬 카드 피드백 받기", "마감 시간 전 라스트 스퍼트 판매",
        "세일/프로모션 상품 연계 판매", "선물용 포장 판매 성공", "신발 또는 가방 카테고리 판매",
        "크로스 셀링 세트 코디 제안 판매"
    ];

    function initMissions() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = "";
        missionPool.forEach((m, idx) => {
            const div = document.createElement('div');
            div.className = "mission-item";
            div.innerText = `${idx+1}. ${m}`;
            div.onclick = () => { if(!isMissionAlreadySet) toggleMission(m, div); };
            grid.appendChild(div);
        });
    }

    function selectTeam(team) {
        selectedTeam = team;
        document.querySelector('.team-card.team-a').classList.remove('selected');
        document.querySelector('.team-card.team-b').classList.remove('selected');
        
        if(team === 'A') {
            document.querySelector('.team-card.team-a').classList.add('selected');
            document.getElementById('members-a').disabled = false;
            document.getElementById('members-b').disabled = true;
            document.getElementById('members-b').value = "";
        } else {
            document.querySelector('.team-card.team-b').classList.add('selected');
            document.getElementById('members-b').disabled = false;
            document.getElementById('members-a').disabled = true;
            document.getElementById('members-a').value = "";
        }

        const targetTeam = selectedTeam === 'A' ? 'B' : 'A';
        const targetTeamName = selectedTeam === 'A' ? '코스 라이언즈' : '253 삼구삼진스';

        fetch(`${FIREBASE_URL}daily_missions/${todayStr}/${targetTeam}.json`)
        .then(res => res.json())
        .then(data => {
            const titleText = document.getElementById('mission-instruction-title');
            const section = document.getElementById('mission-section');
            section.classList.add('active');

            if (data && data.list && data.list.length === 5) {
                isMissionAlreadySet = true;
                titleText.innerText = `✅ [${targetTeamName}] 미션 지정 완료 상태`;
                document.getElementById('mission-grid').style.opacity = "0.4";
                document.getElementById('mission-count').

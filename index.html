<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>253 BASEBALL - MAIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700&family=Black+Han+Sans&display=swap');
        body { margin: 0; padding: 0; background-color: #0b0e14; color: #ffffff; font-family: 'Black Han Sans', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .main-box { width: 100%; max-width: 420px; background: rgba(17, 21, 28, 0.95); border: 2px solid #f2a900; border-radius: 16px; padding: 24px; box-sizing: border-box; box-shadow: 0 0 20px rgba(242, 169, 0, 0.2); text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: #f2a900; font-size: 2rem; margin: 0 0 15px 0; letter-spacing: 2px; }
        .logo-container { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .logo-img { height: 90%; object-fit: contain; display: none; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 0.9rem; color: #aaa; margin-bottom: 6px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #222630; color: #fff; font-family: 'Black Han Sans', sans-serif; font-size: 1rem; }
        .start-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #f2a900, #b88000); border: none; border-radius: 8px; color: white; font-size: 1.2rem; font-family: 'Black Han Sans', sans-serif; cursor: pointer; margin-top: 10px; }
        .admin-section { margin-top: 30px; border-top: 1px dashed #444; padding-top: 20px; }
        .admin-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 14px; background: #222630; border: 1px solid #f2a900; color: #f2a900; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-family: 'Black Han Sans', sans-serif; margin: 6px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #11151c; border: 2px solid #ff4d4d; border-radius: 16px; width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; max-height: 85vh; display: flex; flex-direction: column; }
        .modal-title { font-size: 1.2rem; color: #ff4d4d; margin-bottom: 5px; text-align: center; }
        .category-title { font-size: 0.95rem; color: #00bcd4; margin: 12px 0 6px 0; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .selector-item { background: #222630; padding: 10px; border: 1px solid #444; border-radius: 8px; margin-bottom: 6px; cursor: pointer; font-size: 0.85rem; }
        .selector-item.selected { background: #ff4d4d; border-color: #fff; color: white; }
        .submit-pitch-btn { width: 100%; padding: 12px; background: #ff4d4d; border: none; border-radius: 8px; color: white; font-family: 'Black Han Sans', sans-serif; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>253 BASEBALL</h1>
        <div class="logo-container">
            <img id="logo-lions" class="logo-img" src="lions_logo.png" alt="COS LIONS" style="display:block;">
            <img id="logo-search" class="logo-img" src="strikeouts_logo.png" alt="393 STRIKEOUTS">
        </div>
        <div class="form-group">
            <label>소속 팀 선택</label>
            <select id="team-select" onchange="onTeamChange()">
                <option value="B">🦁 코스 라이언즈 (B)</option>
                <option value="A">⚾ 삼구삼진스 (A)</option>
            </select>
        </div>
        <div class="form-group">
            <label>선수 이름 선택</label>
            <select id="player-select"></select>
        </div>
        <button class="start-btn" onclick="enterGame()">경기장 입장 🏟️</button>

        <div class="admin-section">
            <button class="admin-btn" onclick="openMissionPitcher('B')">삼구삼진스 ➡ 라이언즈 미션 지정</button>
            <button class="admin-btn" onclick="openMissionPitcher('A')">라이언즈 ➡ 삼구진스 미션 지정</button>
        </div>
    </div>

    <div id="pitcher-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">각 카테고리당 1개씩 총 6개 선택</div>
            <div id="modal-mission-pool" class="pool-container" style="overflow-y:auto; flex-grow:1;"></div>
            <button class="submit-pitch-btn" onclick="submitSelectedMissions()">⚾ 선택 완료 및 투구</button>
            <button class="admin-btn" style="width:100%; border:none; background:#333; color:#ccc;" onclick="closeModal()">닫기</button>
        </div>
    </div>

<script>
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const todayStr = new Date().toISOString().split('T')[0];
    
    // 6개 카테고리 미션 구조
    const missionCategories = {
        "1층": ["하이퍼텍스처 옷 2개이상 피팅룸으로 보내기", "웰커밍 인사 + 스몰토크 3회", "3층까지 둘러보실 수 있도록 안내멘트하기 3회"],
        "2층": ["어프로치하여 풀 스타일링 2회", "고객 피팅룸 안내 3회", "17,19 + 다른 아이템 추천"],
        "3층": ["msa 미션 완료하기", "16 + 다른아이템 같이 추천하기 2회"],
        "공유": ["전체층 오버뷰 및 메인테인 워키로 소통하기", "워키로 세일즈 및 액션 리바이즈 공유하기"],
        "옴니": ["3회 스캔 또는 판매 1회", "옴니 스타일링 참고하여 cx하기 1회"],
        "웰빙": ["출근팀 전원 PCA액션 팔로업하기"]
    };

    let selectedMissions = {}; // 카테고리별로 하나씩만 저장
    let currentTargetTeam = "";

    function openMissionPitcher(targetTeam) {
        currentTargetTeam = targetTeam;
        selectedMissions = {};
        const pool = document.getElementById('modal-mission-pool');
        pool.innerHTML = "";

        for (const [cat, items] of Object.entries(missionCategories)) {
            pool.innerHTML += `<div class="category-title">📍 ${cat}</div>`;
            items.forEach((item, idx) => {
                const id = `m-${cat}-${idx}`;
                pool.innerHTML += `<div class="selector-item" id="${id}" onclick="toggleMission('${cat}', '${item}', '${id}')">${item}</div>`;
            });
        }
        document.getElementById('pitcher-modal').style.display = 'flex';
    }

    function toggleMission(cat, item, id) {
        // 해당 카테고리 기존 선택 해제
        document.querySelectorAll(`[id^="m-${cat}-"]`).forEach(el => el.classList.remove('selected'));
        // 새 선택
        selectedMissions[cat] = item;
        document.getElementById(id).classList.add('selected');
    }

    function submitSelectedMissions() {
        const finalMissions = Object.values(selectedMissions);
        if (finalMissions.length !== 6) {
            alert("각 카테고리에서 하나씩, 총 6개를 모두 선택해야 합니다!"); return;
        }
        fetch(`${FIREBASE_URL}daily_missions/${todayStr}/${currentTargetTeam}.json`, {
            method: 'PUT', body: JSON.stringify({ list: finalMissions })
        }).then(() => { alert("투구 완료!"); closeModal(); });
    }

    function closeModal() { document.getElementById('pitcher-modal').style.display = 'none'; }
    // ... 나머지 기본 함수 동일
</script>
</body>
</html>

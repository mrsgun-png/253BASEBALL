<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>253 BASEBALL - DRIVE ACTION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Black+Han+Sans&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Black Han Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 650px;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
            /* 첫 번째 첨부파일 배경 적용 */
            background: linear-gradient(rgba(11, 14, 20, 0.75), rgba(11, 14, 20, 0.9)), 
                        url('https://i.ibb.co/6R2MvX6/image.png') no-repeat center center; 
            background-size: cover;
            border: 4px solid #f2a900;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(242, 169, 0, 0.4);
        }

        .main-title {
            font-size: 3.2rem;
            color: #f2a900;
            text-shadow: 4px 4px 0px #4a154b, 7px 7px 0px #000;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .sub-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            color: #00bcd4;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0px #000;
        }

        .team-selection {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .team-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #333;
            border-radius: 12px;
            padding: 15px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .team-card.team-a:hover, .team-card.team-a.selected {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.2);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.4);
        }

        .team-card.team-b:hover, .team-card.team-b.selected {
            border-color: #0077b6;
            background: rgba(0, 119, 182, 0.2);
            box-shadow: 0 0 15px rgba(0, 119, 182, 0.4);
        }

        .team-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 10px auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            font-weight: bold;
        }
        .team-a .team-logo { background: linear-gradient(135deg, #ff6b35, #4a154b); color: #fff; border: 2px solid #fff; }
        .team-b .team-logo { background: linear-gradient(135deg, #0077b6, #f2a900); color: #fff; border: 2px solid #fff; }

        .member-select {
            width: 100%;
            padding: 10px;
            font-family: 'Black Han Sans', sans-serif;
            background-color: #222;
            color: #fff;
            border: 2px solid #444;
            border-radius: 8px;
        }

        /* 🎯 미션 정하기 섹션 */
        .mission-section {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00bcd4;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }
        .mission-section.active { display: block; }
        .mission-header {
            font-size: 1.1rem;
            color: #00bcd4;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .mission-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .mission-item {
            background: #222;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }
        .mission-item.selected {
            background: #00bcd4;
            color: #000;
            border-color: #fff;
        }

        .start-btn {
            width: 100%;
            padding: 15px;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.5rem;
            background: linear-gradient(#f2a900, #ff8c00);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 0px #b37d00;
            transition: all 0.1s ease;
        }
        .start-btn:disabled {
            background: #444;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="main-title">253 BASEBALL</div>
    <div class="sub-title">LET'S DRIVE SALES!</div>

    <div class="team-selection">
        <div class="team-card team-a" onclick="selectTeam('A')">
            <div class="team-logo">K</div>
            <div style="margin-bottom:10px;">253 삼구삼진스</div>
            <select class="member-select" id="members-a" onclick="event.stopPropagation()" onchange="checkReady()">
                <option value="">선수 선택</option>
                <option value="성경">성경</option>
                <option value="윤정">윤정</option>
                <option value="정훈">정훈</option>
                <option value="혜인">혜인</option>
                <option value="선우">선우</option>
            </select>
        </div>

        <div class="team-card team-b" onclick="selectTeam('B')">
            <div class="team-logo">L</div>
            <div style="margin-bottom:10px;">코스 라이언즈</div>
            <select class="member-select" id="members-b" onclick="event.stopPropagation()" onchange="checkReady()">
                <option value="">선수 선택</option>
                <option value="주하">주하</option>
                <option value="유진">유진</option>
                <option value="지인">지인</option>
                <option value="정환">정환</option>
                <option value="채령">채령</option>
            </select>
        </div>
    </div>

    <div class="mission-section" id="mission-section">
        <div class="mission-header">
            <span>⚾ 상대팀에게 던질 미션 정하기</span>
            <span id="mission-count" style="color: #ff4d4d;">(0 / 5)</span>
        </div>
        <div class="mission-grid" id="mission-grid"></div>
    </div>

    <button class="start-btn" id="start-btn" onclick="enterGame()" disabled>팀과 선수를 선택하세요</button>
</div>

<script>
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/"; 
    let selectedTeam = null;
    let selectedMissions = [];

    // 매장 맞춤형 미션 목록 16개
    const missionPool = [
        "아우터 판매 1건 달성", "니트 + 바지 세트 판매", "객단가 20만원 이상 달성",
        "신상품 피팅 유도 3회", "결제 시 멤버십 신규 가입 유도", "액세서리 추가 판매 성공",
        "단일 영수증 3PCS 이상 판매", "중요 존(Zone) 마네킹 디스플레이 정비", "린넨 셔츠 판매 1건",
        "오픈 직후 첫 마수걸이 판매", "고객 칭찬 카드 피드백 받기", "마감 시간 전 라스트 스퍼트 판매",
        "세일/프로모션 상품 연계 판매", "선물용 포장 판매 성공", "신발 또는 가방 카테고리 판매",
        "크로스 셀링 세트 코디 제안 판매"
    ];

    function initMissions() {
        const grid = document.getElementById('mission-grid');
        grid.innerHTML = "";
        missionPool.forEach((m, idx) => {
            const div = document.createElement('div');
            div.className = "mission-item";
            div.innerText = `${idx+1}. ${m}`;
            div.onclick = () => toggleMission(m, div);
            grid.appendChild(div);
        });
    }

    function selectTeam(team) {
        selectedTeam = team;
        document.querySelector('.team-card.team-a').classList.remove('selected');
        document.querySelector('.team-card.team-b').classList.remove('selected');
        
        if(team === 'A') {
            document.querySelector('.team-card.team-a').classList.add('selected');
            document.getElementById('members-a').disabled = false;
            document.getElementById('members-b').disabled = true;
            document.getElementById('members-b').value = "";
        } else {
            document.querySelector('.team-card.team-b').classList.add('selected');
            document.getElementById('members-b').disabled = false;
            document.getElementById('members-a').disabled = true;
            document.getElementById('members-a').value = "";
        }
        document.getElementById('mission-section').classList.add('active');
        checkReady();
    }

    function toggleMission(mission, element) {
        const idx = selectedMissions.indexOf(mission);
        if(idx > -1) {
            selectedMissions.splice(idx, 1);
            element.classList.remove('selected');
        } else {
            if(selectedMissions.length >= 5) {
                alert("미션은 최대 5개까지만 선택할 수 있습니다!");
                return;
            }
            selectedMissions.push(mission);
            element.classList.add('selected');
        }
        document.getElementById('mission-count').innerText = `(${selectedMissions.length} / 5)`;
        checkReady();
    }

    function checkReady() {
        const btn = document.getElementById('start-btn');
        const nameA = document.getElementById('members-a').value;
        const nameB = document.getElementById('members-b').value;
        const hasPlayer = (selectedTeam === 'A' && nameA) || (selectedTeam === 'B' && nameB);

        if (hasPlayer && selectedMissions.length === 5) {
            const pName = selectedTeam === 'A' ? nameA : nameB;
            btn.disabled = false;
            btn.innerText = `⚾ ${pName} 선수, 미션 가지고 경기 입장!`;
        } else if (hasPlayer) {
            btn.disabled = true;
            btn.innerText = `상대팀에게 줄 미션 5개를 골라주세요`;
        } else {
            btn.disabled = true;
            btn.innerText = "팀과 선수를 선택하세요";
        }
    }

    function enterGame() {
        const name = selectedTeam === 'A' ? document.getElementById('members-a').value : document.getElementById('members-b').value;
        const teamName = selectedTeam === 'A' ? "253 삼구삼진스" : "코스 라이언즈";
        
        localStorage.setItem('baseball_team', selectedTeam);
        localStorage.setItem('baseball_team_name', teamName);
        localStorage.setItem('baseball_player', name);
        localStorage.setItem('baseball_selected_missions', JSON.stringify(selectedMissions));
        
        window.location.href = 'game.html';
    }

    document.getElementById('members-a').disabled = true;
    document.getElementById('members-b').disabled = true;
    initMissions();
</script>
</body>
</html>

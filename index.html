<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>253 BASEBALL - DRIVE ACTION</title>
    <style>
        /* 레트로 폰트 및 기본 스타일 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Black+Han+Sans&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Black Han Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 메인 컨테이너 (보내주신 첫 번째 이미지 배경 활용) */
        .login-container {
            width: 100%;
            max-width: 600px;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
            background: linear-gradient(rgba(11, 14, 20, 0.85), rgba(11, 14, 20, 0.95)), 
                        url('https://i.ibb.co/6R2MvX6/image.png') no-repeat center center; /* 임시 배경 링크, 원본 이미지를 다이렉트 링크로 교체 가능 */
            background-size: cover;
            border: 4px solid #f2a900;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(242, 169, 0, 0.3);
        }

        /* 메인 타이틀 효과 */
        .main-title {
            font-size: 3rem;
            color: #f2a900;
            text-shadow: 4px 4px 0px #4a154b, 7px 7px 0px #000;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .sub-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #00bcd4;
            margin-bottom: 35px;
            text-shadow: 2px 2px 0px #000;
        }

        /* 팀 선택 영역 */
        .team-selection {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid #333;
            border-radius: 12px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* 첫 번째 팀: 253 삼구삼진스 (주황/보라 컨셉) */
        .team-card.team-a:hover, .team-card.team-a.selected {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.15);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.4);
            transform: translateY(-5px);
        }

        /* 두 번째 팀: 코스 라이언즈 (블루/골드 컨셉) */
        .team-card.team-b:hover, .team-card.team-b.selected {
            border-color: #0077b6;
            background: rgba(0, 119, 182, 0.15);
            box-shadow: 0 0 15px rgba(0, 119, 182, 0.4);
            transform: translateY(-5px);
        }

        /* 팀 로고 디자인 */
        .team-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .team-a .team-logo {
            background: linear-gradient(135deg, #ff6b35, #4a154b);
            color: #fff;
            border: 2px solid #fff;
        }
        .team-b .team-logo {
            background: linear-gradient(135deg, #0077b6, #f2a900);
            color: #fff;
            border: 2px solid #fff;
        }

        .team-name {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #fff;
        }

        /* 멤버 선택 드롭다운 */
        .member-select {
            width: 100%;
            padding: 12px;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.1rem;
            background-color: #222;
            color: #fff;
            border: 2px solid #444;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
        }
        .member-select:disabled {
            background-color: #111;
            color: #666;
            cursor: not-allowed;
        }

        /* 입장 버튼 */
        .start-btn {
            width: 100%;
            padding: 15px;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.5rem;
            background: linear-gradient(#f2a900, #ff8c00);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 5px 0px #b37d00;
            transition: all 0.1s ease;
            margin-top: 10px;
        }
        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #b37d00;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="main-title">253 BASEBALL</div>
    <div class="sub-title">LET'S DRIVE SALES!</div>

    <!-- 팀 선택 카드 -->
    <div class="team-selection">
        <!-- A팀 -->
        <div class="team-card team-a" onclick="selectTeam('A')">
            <div class="team-logo">K</div>
            <div class="team-name">253 삼구삼진스</div>
            <select class="member-select" id="members-a" onclick="event.stopPropagation()" onchange="checkReady()">
                <option value="">선수 선택</option>
                <option value="성경">성경</option>
                <option value="윤정">윤정</option>
                <option value="정훈">정훈</option>
                <option value="혜인">혜인</option>
                <option value="선우">선우</option>
            </select>
        </div>

        <!-- B팀 -->
        <div class="team-card team-b" onclick="selectTeam('B')">
            <div class="team-logo">L</div>
            <div class="team-name">코스 라이언즈</div>
            <select class="member-select" id="members-b" onclick="event.stopPropagation()" onchange="checkReady()">
                <option value="">선수 선택</option>
                <option value="주하">주하</option>
                <option value="유진">유진</option>
                <option value="지인">지인</option>
                <option value="정환">정환</option>
                <option value="채령">채령</option>
            </select>
        </div>
    </div>

    <!-- 플레이 시작 버튼 -->
    <button class="start-btn" id="start-btn" onclick="enterGame()" disabled>팀과 선수를 선택하세요</button>
</div>

<script>
    // 🌟 [중요] 본인의 Firebase Realtime Database 주소를 넣어주세요!
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/"; 

    let selectedTeam = null;

    // 팀 선택 처리 기능
    function selectTeam(team) {
        selectedTeam = team;
        
        // 카드 활성화 비활성화 비주얼 처리
        document.querySelector('.team-card.team-a').classList.remove('selected');
        document.querySelector('.team-card.team-b').classList.remove('selected');
        
        if(team === 'A') {
            document.querySelector('.team-card.team-a').classList.add('selected');
            document.getElementById('members-a').disabled = false;
            document.getElementById('members-b').disabled = true;
            document.getElementById('members-b').value = "";
        } else {
            document.querySelector('.team-card.team-b').classList.add('selected');
            document.getElementById('members-b').disabled = false;
            document.getElementById('members-a').disabled = true;
            document.getElementById('members-a').value = "";
        }
        checkReady();
    }

    // 모든 조건이 충족되었는지 확인하는 기능
    function checkReady() {
        const btn = document.getElementById('start-btn');
        const nameA = document.getElementById('members-a').value;
        const nameB = document.getElementById('members-b').value;

        if (selectedTeam === 'A' && nameA) {
            btn.disabled = false;
            btn.innerText = `⚾ ${nameA} 선수, 경기 입장!`;
        } else if (selectedTeam === 'B' && nameB) {
            btn.disabled = false;
            btn.innerText = `⚾ ${nameB} 선수, 경기 입장!`;
        } else {
            btn.disabled = true;
            btn.innerText = "팀과 선수를 선택하세요";
        }
    }

    // 경기장(본 게임 페이지)으로 이동하기
    function enterGame() {
        const name = selectedTeam === 'A' ? document.getElementById('members-a').value : document.getElementById('members-b').value;
        const teamName = selectedTeam === 'A' ? "253 삼구삼진스" : "코스 라이언즈";
        
        // 웹 브라우저 메모리에 일시적으로 정보 저장 후 경기장 전광판 페이지(game.html)로 이동
        localStorage.setItem('baseball_team', selectedTeam);
        localStorage.setItem('baseball_team_name', teamName);
        localStorage.setItem('baseball_player', name);
        
        // 두 번째 화면인 game.html 파일로 이동시킵니다.
        window.location.href = 'game.html';
    }

    // 초기 드롭다운 비활성화
    document.getElementById('members-a').disabled = true;
    document.getElementById('members-b').disabled = true;
</script>

</body>
</html>

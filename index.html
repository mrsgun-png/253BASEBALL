<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>253 BASEBALL - MAIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700&family=Black+Han+Sans&display=swap');
        body {
            margin: 0; padding: 0; background-color: #0b0e14; color: #ffffff;
            font-family: 'Black Han Sans', sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box;
        }
        .main-box {
            width: 100%; max-width: 420px; background: rgba(17, 21, 28, 0.95);
            border: 2px solid #f2a900; border-radius: 16px; padding: 24px; box-sizing: border-box;
            box-shadow: 0 0 20px rgba(242, 169, 0, 0.2); text-align: center;
        }
        h1 { font-family: 'Orbitron', sans-serif; color: #f2a900; font-size: 2rem; margin: 0 0 15px 0; letter-spacing: 2px; }
        
        .logo-container {
            width: 100%; height: 180px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 1px solid #333; overflow: hidden;
        }
        .logo-img { height: 90%; object-fit: contain; display: none; animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 0.9rem; color: #aaa; margin-bottom: 6px; }
        select {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
            background: #222630; color: #fff; font-family: 'Black Han Sans', sans-serif; font-size: 1rem; box-sizing: border-box;
        }
        .start-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #f2a900, #b88000);
            border: none; border-radius: 8px; color: white; font-size: 1.2rem; font-family: 'Black Han Sans', sans-serif;
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .admin-section { margin-top: 30px; border-top: 1px dashed #444; padding-top: 20px; }
        .admin-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 14px; background: #222630; border: 1px solid #f2a900; color: #f2a900;
            border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-family: 'Black Han Sans', sans-serif; margin: 6px;
        }

        .real-baseball-icon { width: 18px; height: 18px; object-fit: contain; vertical-align: middle; flex-shrink: 0; }

        /* 📋 모달 스타일 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: #11151c; border: 2px solid #ff4d4d; border-radius: 16px; width: 100%; max-width: 400px;
            padding: 20px; box-sizing: border-box; max-height: 85vh; display: flex; flex-direction: column;
        }
        .modal-title { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.2rem; color: #ff4d4d; margin-bottom: 5px; text-align: center; flex-shrink: 0; }
        .pool-container { overflow-y: auto; flex-grow: 1; margin-bottom: 10px; padding-right: 5px; }
        
        .category-title { font-size: 0.95rem; color: #00bcd4; margin: 12px 0 6px 0; border-bottom: 1px solid #333; padding-bottom: 4px; text-align: left; }
        
        .selector-item {
            background: #222630; padding: 10px; border: 1px solid #444; border-radius: 8px;
            margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; text-align: left; line-height: 1.3;
        }
        .selector-item.selected { background: #ff4d4d; border-color: #fff; color: white; }
        .submit-pitch-btn {
            width: 100%; padding: 12px; background: #ff4d4d; border: none; border-radius: 8px;
            color: white; font-family: 'Black Han Sans', sans-serif; font-size: 1.1rem; cursor: pointer; margin-top: 5px; flex-shrink: 0;
        }

        .history-row { display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>253 BASEBALL</h1>
        
        <div class="logo-container">
            <img id="logo-lions" class="logo-img" src="lions_logo.png" alt="COS LIONS">
            <img id="logo-search" class="logo-img" src="strikeouts_logo.png" alt="393 STRIKEOUTS">
        </div>

        <div class="form-group">
            <label>소속 팀 선택</label>
            <select id="team-select" onchange="onTeamChange()">
                <option value="B">🦁 코스 라이언즈 (B)</option>
                <option value="A">⚾ 삼구삼진스 (A)</option>
            </select>
        </div>

        <div class="form-group">
            <label>선수 이름 선택</label>
            <select id="player-select"></select>
        </div>

        <button class="start-btn" onclick="enterGame()">경기장 입장 🏟️</button>

        <div class="admin-section">
            <div style="font-size:0.85rem; color:#aaa; margin-bottom:10px;">☀️ 매장 매니저 & 첫출근자 보드</div>
            
            <button class="admin-btn" onclick="openMissionPitcher('B')">
                <img src="https://img.icons8.com/emoji/48/baseball.png" class="real-baseball-icon" alt="야구공"> 삼구삼진스 ➡ 라이언즈 미션
            </button>
            <button class="admin-btn" onclick="openMissionPitcher('A')">
                <span>🦁</span> 라이언즈 ➡ 삼구진스 미션
            </button>
            
            <div style="margin-top:15px; border-top: 1px dashed #333; padding-top: 15px;">
                <button class="admin-btn" style="background:#111827; border-color:#00bcd4; color:#00bcd4;" onclick="openHistoryBoard()">📊 7월 승패 전적 보드</button>
                <button class="admin-btn" style="background:#4d1414; border-color:#ff4d4d; color:#ffb3b3; padding:10px;" onclick="endMatchAndSave()">🏁 오늘 경기 종료 (결과 저장)</button>
            </div>
        </div>
    </div>

    <div id="pitcher-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-target-title">상대팀 미션 6개 지정하기</div>
            <div style="font-size:0.8rem; color:#aaa; text-align:center; margin-bottom:10px; flex-shrink:0;" id="modal-count-info">선택된 미션: 0 / 6</div>
            <div id="modal-mission-pool" class="pool-container"></div>
            <button class="submit-pitch-btn" onclick="submitSelectedMissions()">⚾ 선택한 미션 투구하기</button>
            <button class="admin-btn" style="width:100%; border:none; margin:8px 0 0 0; background:#333; color:#ccc; flex-shrink:0;" onclick="closeModal('pitcher-modal')">닫기</button>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🏆 7월 시즌 승패 전적</div>
            <div id="history-list" class="pool-container" style="margin-top: 10px;"></div>
            <button class="admin-btn" style="width:100%; border:none; margin:8px 0 0 0; background:#333; color:#ccc;" onclick="closeModal('history-modal')">닫기</button>
        </div>
    </div>

<script>
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const todayStr = new Date().toISOString().split('T')[0];

    const teamPlayers = {
        A: ["성경", "윤정", "정훈", "혜인", "선우"], 
        B: ["주하", "유진", "지인", "정환", "채령"]  
    };

    // 📋 정밀 조정된 새로운 카테고리별 미션 리스트 (총 11개)
    const missionCategories = {
        "1층": [
            "하이퍼텍스처 옷 2개이상 피팅룸으로 보내기",
            "17,19아이템 다른 아이템과 같이 추천하기"
        ],
        "2층": [
            "어디셔널 아이템 2개이상 2회추천",
            "어프로치하여 풀 스타일링 2회",
            "17,19 + 다른 아이템 추천하기"
        ],
        "3층": [
            "New edit 키워드 활용하여 cx하기",
            "16+ 다른 아이템 같이 추천하기"
        ],
        "공유": [
            "워키로 세일즈 공유 및 간단한 액션 만들어서 공유하기"
        ],
        "옴니": [
            "옴니 - 3회스캔 또는 판매 1회"
        ],
        "웰빙": [
            "출근팀 전원 PCA액션 팔로업하기"
        ]
    };

    let currentTargetTeam = ""; 
    let selectedMissions = [];

    function onTeamChange() {
        updateTeamLogo();
        updatePlayerList();
    }

    function updateTeamLogo() {
        const team = document.getElementById('team-select').value;
        document.getElementById('logo-lions').style.display = (team === 'B') ? 'block' : 'none';
        document.getElementById('logo-search').style.display = (team === 'A') ? 'block' : 'none';
    }

    function updatePlayerList() {
        const team = document.getElementById('team-select').value;
        const playerSelect = document.getElementById('player-select');
        playerSelect.innerHTML = "";
        teamPlayers[team].forEach(player => {
            const opt = document.createElement('option');
            opt.value = player;
            opt.innerText = player;
            playerSelect.appendChild(opt);
        });
    }

    function enterGame() {
        const teamSel = document.getElementById('team-select');
        const playerSel = document.getElementById('player-select').value;
        let displayName = teamSel.options[teamSel.selectedIndex].text;
        localStorage.setItem('baseball_team', teamSel.value);
        localStorage.setItem('baseball_team_name', displayName);
        localStorage.setItem('baseball_player', playerSel);
        location.href = 'game.html';
    }

    function openMissionPitcher(targetTeam) {
        currentTargetTeam = targetTeam; 
        
        fetch(`${FIREBASE_URL}daily_missions/${todayStr}/${currentTargetTeam}.json`).then(res => res.json()).then(data => {
            if(data && data.list && data.list.length === 6) {
                alert("⚠️ 이미 해당 팀의 오늘의 미션이 투구 완료되었습니다! (수정 불가)"); return;
            }
            
            const titleEl = document.getElementById('modal-target-title');
            if (currentTargetTeam === 'A') {
                titleEl.innerHTML = `🎯 삼구삼진스에게 던질 6개 선택`;
            } else {
                titleEl.innerHTML = `🎯 라이언즈에게 던질 6개 선택`;
            }

            selectedMissions = [];
            updateModalCount();

            const poolContainer = document.getElementById('modal-mission-pool');
            let html = "";
            let mIdx = 0;
            for (const [cat, missions] of Object.entries(missionCategories)) {
                html += `<div class="category-title">📍 ${cat} 미션</div>`;
                missions.forEach(mission => {
                    html += `<div class="selector-item" id="m-item-${mIdx}" onclick="toggleMissionSelect('${mission}', ${mIdx})"><span>${mission}</span></div>`;
                    mIdx++;
                });
            }
            poolContainer.innerHTML = html;
            document.getElementById('pitcher-modal').style.display = 'flex';
        });
    }

    function toggleMissionSelect(mission, idx) {
        const itemEl = document.getElementById(`m-item-${idx}`);
        const existIdx = selectedMissions.indexOf(mission);
        if (existIdx > -1) {
            selectedMissions.splice(existIdx, 1);
            itemEl.classList.remove('selected');
        } else {
            if (selectedMissions.length >= 6) { alert("미션은 딱 6개까지만 지정할 수 있습니다!"); return; }
            selectedMissions.push(mission);
            itemEl.classList.add('selected');
        }
        updateModalCount();
    }

    function updateModalCount() {
        document.getElementById('modal-count-info').innerText = `선택된 미션: ${selectedMissions.length} / 6`;
    }

    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

    function submitSelectedMissions() {
        if(selectedMissions.length !== 6) { alert("정확히 6개의 미션을 선택해야 투구할 수 있습니다!"); return; }
        const targetName = (currentTargetTeam === 'A') ? '삼구삼진스' : '코스 라이언즈';
        if(!confirm(`선택하신 6개의 미션을 ${targetName}팀의 최종 미션판으로 투구하시겠습니까?`)) return;

        fetch(`${FIREBASE_URL}daily_missions/${todayStr}/${currentTargetTeam}.json`, {
            method: 'PUT', body: JSON.stringify({ list: selectedMissions })
        }).then(() => {
            alert(`🎯 ${targetName}팀판에 투구가 완료되었습니다!`);
            closeModal('pitcher-modal');
        });
    }

    function endMatchAndSave() {
        if(!confirm("⚠️ 오늘 경기를 마감하고 전적보드에 결과를 저장하시겠습니까? (이후 루상과 점수 데이터는 리셋됩니다)")) return;
        
        fetch(`${FIREBASE_URL}team_status/${todayStr}.json`).then(res => res.json()).then(data => {
            let scoreA = (data && data.A) ? data.A.score : 0;
            let scoreB = (data && data.B) ? data.B.score : 0;
            let winner = "무승부 🤝";
            let color = "#aaa";
            if(scoreA > scoreB) { winner = "⚾ 삼구삼진스 승리!"; color = "#ff6b35"; }
            if(scoreB > scoreA) { winner = "🦁 코스 라이언즈 승리!"; color = "#0077b6"; }

            const historyData = { scoreA, scoreB, winner, color };

            fetch(`${FIREBASE_URL}match_history/${todayStr}.json`, {
                method: 'PUT', body: JSON.stringify(historyData)
            }).then(() => {
                Promise.all([
                    fetch(`${FIREBASE_URL}daily_missions/${todayStr}.json`, { method: 'DELETE' }),
                    fetch(`${FIREBASE_URL}daily_cleared/${todayStr}.json`, { method: 'DELETE' }),
                    fetch(`${FIREBASE_URL}team_status/${todayStr}.json`, { method: 'DELETE' }), 
                    fetch(`${FIREBASE_URL}logs.json`, { method: 'DELETE' })
                ]).then(() => alert("오늘 경기가 전적에 완벽히 저장되고 게임판이 초기화되었습니다!"));
            });
        });
    }

    function openHistoryBoard() {
        fetch(`${FIREBASE_URL}match_history.json`).then(res => res.json()).then(data => {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            if(!data) { list.innerHTML = "<div style='text-align:center; color:#aaa; margin-top:20px;'>아직 기록된 7월 전적이 없습니다.</div>"; }
            else {
                Object.keys(data).sort().reverse().forEach(date => {
                    const record = data[date];
                    list.innerHTML += `
                        <div class="history-row">
                            <div style="color:#aaa;">${date}</div>
                            <div style="font-weight:bold; color:${record.color};">${record.winner}</div>
                            <div style="font-family:'Orbitron', sans-serif;">A ${record.scoreA} : ${record.scoreB} B</div>
                        </div>
                    `;
                });
            }
            document.getElementById('history-modal').style.display = 'flex';
        });
    }

    window.onload = onTeamChange;
</script>
</body>
</html>

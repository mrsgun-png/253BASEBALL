<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>253 BASEBALL - SCOREBOARD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Black+Han+Sans&display=swap');

        body {
            margin: 0;
            padding: 0;
            /* 두 번째 대형 야구장 배경 레이아웃 최적화 */
            background: linear-gradient(rgba(11, 14, 20, 0.4), rgba(11, 14, 20, 0.85)), 
                        url('https://i.ibb.co/3sX8M8f/Designer-4.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Black Han Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        .user-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #f2a900;
        }

        .scoreboard {
            width: 100%;
            max-width: 800px;
            background: rgba(17, 21, 28, 0.9);
            border: 4px solid #00bcd4;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 25px rgba(0, 188, 212, 0.4);
            margin-bottom: 20px;
        }

        .board-header {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: #f2a900;
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #444;
            padding-bottom: 10px;
        }

        .score-table {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            padding: 15px 20px;
            border-radius: 8px;
        }
        .board-team-name { font-size: 1.5rem; }
        .board-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: #fff;
        }

        /* 🎯 실시간 타석 미션 보드 디자인 */
        .action-board {
            width: 100%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #f2a900;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }
        .action-title {
            font-size: 1.3rem;
            color: #00bcd4;
            margin-bottom: 15px;
            text-align: center;
        }

        .mission-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        .mission-btn {
            width: 100%;
            padding: 15px 20px;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.2rem;
            border: 2px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }
        .mission-btn.cleared {
            background: linear-gradient(135deg, #2d9a74, #1a5c43);
            border-color: #4abc96;
            color: #fff;
            text-decoration: line-through;
            opacity: 0.7;
            cursor: not-allowed;
        }

        .log-container {
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            max-height: 180px;
            overflow-y: auto;
        }
        .log-item { padding: 6px 0; font-size: 0.95rem; border-bottom: 1px dashed #222; text-align: left; }
    </style>
</head>
<body>

    <div class="user-bar">
        <div>
            <span id="user-team-display" style="color:#f2a900;"></span> 
            <span id="user-player-display" style="color: #00bcd4;"></span> 선수 타석 ⚾
        </div>
        <button style="background:#ff4d4d; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer;" onclick="location.href='index.html'">교체/퇴장</button>
    </div>

    <div class="scoreboard">
        <div class="board-header">COS 253 BASEBALL REALTIME BOARD</div>
        <div class="score-table">
            <div class="team-row" style="border-left: 6px solid #ff6b35;">
                <div class="board-team-name">🔥 253 삼구삼진스</div>
                <div class="board-score" id="score-A" style="color:#ff6b35;">0</div>
            </div>
            <div class="team-row" style="border-left: 6px solid #0077b6;">
                <div class="board-team-name">🦁 코스 라이언즈</div>
                <div class="board-score" id="score-B" style="color:#0077b6;">0</div>
            </div>
        </div>
    </div>

    <div class="action-board">
        <div class="action-title">🎯 부여된 5개 미션을 격파해 안타를 치세요!</div>
        <div class="mission-list" id="game-mission-list"></div>
    </div>

    <div class="log-container">
        <div id="log-feed"></div>
    </div>

<script>
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/";

    const myTeam = localStorage.getItem('baseball_team'); 
    const myTeamName = localStorage.getItem('baseball_team_name');
    const myPlayer = localStorage.getItem('baseball_player');
    const rawMissions = localStorage.getItem('baseball_selected_missions');
    const myMissions = rawMissions ? JSON.parse(rawMissions) : [];

    if (!myTeam || !myPlayer) window.location.href = 'index.html';

    document.getElementById('user-team-display').innerText = myTeamName;
    document.getElementById('user-player-display').innerText = `[${myPlayer}]`;

    // 어떤 미션이 클리어되었는지 기록 추적 배열
    let clearedMissions = [];

    function renderMissions() {
        const container = document.getElementById('game-mission-list');
        container.innerHTML = "";

        // 루타 매핑 텍스트 목록
        const hitSpecs = ["1루타 (+1)", "2루타 (+2)", "3루타 (+3)", "홈런 (+4)", "2점 홈런 🎉 (+4)"];

        myMissions.forEach((mission, index) => {
            const btn = document.createElement('button');
            btn.className = "mission-btn";
            
            const isCleared = clearedMissions.includes(mission);
            if(isCleared) btn.classList.add('cleared');

            btn.innerHTML = `<span>🔥 미션 ${index+1}: ${mission}</span> <b style="color:#f2a900;">${hitSpecs[index]}</b>`;
            btn.onclick = () => {
                if(!isCleared) triggerMissionClear(mission, index + 1);
            };
            container.appendChild(btn);
        });
    }

    function triggerMissionClear(missionName, currentStep) {
        let hitText = "";
        let points = 0;

        if (currentStep === 1) { hitText = "1루타 안타!"; points = 1; }
        else if (currentStep === 2) { hitText = "우중간 가르는 2루타!!"; points = 2; }
        else if (currentStep === 3) { hitText = "펜스 직격 3루타!!!"; points = 3; }
        else if (currentStep === 4) { hitText = "💥 대형 솔로 홈런!!! 💥"; points = 4; }
        else if (currentStep === 5) { hitText = "💥🎉 5개 올클리어!! 2점 백투백 홈런!!! (+코스머니 1,000원)"; points = 4; }

        if(!confirm(`[${missionName}] 미션을 완수하여 점수를 올리시겠습니까?`)) return;

        clearedMissions.push(missionName);
        
        const currentScore = parseInt(document.getElementById(`score-${myTeam}`).innerText) || 0;
        const newScore = currentScore + points;

        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

        const logData = {
            team: myTeam,
            teamName: myTeamName,
            player: myPlayer,
            hitText: `미션 성공! [${hitText}]`,
            time: timeStr
        };

        // 점수 전송
        fetch(`${FIREBASE_URL}scores/${myTeam}.json`, { method: 'PUT', body: JSON.stringify(newScore) })
        .then(() => fetch(`${FIREBASE_URL}logs.json`, { method: 'POST', body: JSON.stringify(logData) }))
        .then(() => {
            renderMissions();
            initLiveScoreboard();
            if(currentStep === 5) {
                alert("⚾ 대박! 5개 미션 올클리어! 코스머니 +1,000 보너스 획득에 성공했습니다! 점수판을 확인하세요!");
            }
        });
    }

    function initLiveScoreboard() {
        fetch(`${FIREBASE_URL}scores.json`).then(res => res.json()).then(data => {
            if(data) {
                document.getElementById('score-A').innerText = data.A !== undefined ? data.A : 0;
                document.getElementById('score-B').innerText = data.B !== undefined ? data.B : 0;
            }
        });

        fetch(`${FIREBASE_URL}logs.json?orderBy="$key"&limitToLast=10`).then(res => res.json()).then(data => {
            const feed = document.getElementById('log-feed');
            if(!data) return;
            feed.innerHTML = "";
            Object.keys(data).reverse().forEach(key => {
                const log = data[key];
                const div = document.createElement('div');
                div.className = "log-item";
                div.innerHTML = `⏱️ [${log.time}] <b>${log.teamName}</b> ${log.player} 선수 ➡️ ${log.hitText}`;
                feed.appendChild(div);
            });
        });
    }

    renderMissions();
    setInterval(initLiveScoreboard, 2000);
    window.onload = initLiveScoreboard;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>253 BASEBALL - SCOREBOARD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Black+Han+Sans&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(11, 14, 20, 0.35), rgba(11, 14, 20, 0.75)), 
                        url('stadium.png') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Black Han Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        .user-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #f2a900;
        }

        .scoreboard {
            width: 100%;
            max-width: 800px;
            background: rgba(17, 21, 28, 0.85);
            border: 4px solid #00bcd4;
            border-radius: 12px;
            padding: 15px 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .board-header {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: #f2a900;
            font-size: 1.3rem;
            margin-bottom: 12px;
            border-bottom: 2px dashed #444;
            padding-bottom: 8px;
        }

        .score-table { display: flex; flex-direction: column; gap: 10px; }
        .team-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 8px; }
        .board-team-name { font-size: 1.4rem; }
        .board-score { font-family: 'Orbitron', sans-serif; font-size: 2.4rem; }

        .action-board {
            width: 100%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.85);
            border: 3px solid #ff4d4d;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .action-title { font-size: 1.3rem; color: #ff4d4d; margin-bottom: 15px; text-align: center; }

        .mission-list { display: flex; flex-direction: column; gap: 10px; }
        .mission-btn {
            width: 100%;
            padding: 16px 20px;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.15rem;
            border: 2px solid #444;
            border-radius: 8px;
            background: #222;
            color: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mission-btn.cleared {
            background: linear-gradient(135deg, #1d6f4f, #11422f);
            border-color: #2d9a74;
            color: #888;
            text-decoration: line-through;
            pointer-events: none;
        }

        /* 📊 일별 집계 테이블 디자인 */
        .history-board {
            width: 100%;
            max-width: 800px;
            background: rgba(10, 15, 25, 0.9);
            border: 2px solid #f2a900;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            margin-top: 15px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .history-table th, .history-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
            font-size: 0.95rem;
        }
        .history-table th { background-color: rgba(242, 169, 0, 0.2); color: #f2a900; }

        .log-container {
            width: 100%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-item { padding: 5px 0; font-size: 0.9rem; border-bottom: 1px dashed #222; text-align: left; }
    </style>
</head>
<body>

    <div class="user-bar">
        <div>
            <span id="user-team-display" style="color:#f2a900;"></span> 
            <span id="user-player-display" style="color: #00bcd4;"></span> 타석 활성화 중 ⚾
        </div>
        <button style="background:#ff4d4d; border:none; color:white; padding:6px 12px; border-radius:4px; cursor:pointer;" onclick="location.href='index.html'">교체/퇴장</button>
    </div>

    <div class="scoreboard">
        <div class="board-header" id="today-board-title">COS 253 BASEBALL REALTIME BOARD</div>
        <div class="score-table">
            <div class="team-row" style="border-left: 6px solid #ff6b35;">
                <div class="board-team-name">🔥 253 삼구삼진스</div>
                <div class="board-score" id="score-A" style="color:#ff6b35;">0</div>
            </div>
            <div class="team-row" style="border-left: 6px solid #0077b6;">
                <div class="board-team-name">🦁 코스 라이언즈</div>
                <div class="board-score" id="score-B" style="color:#0077b6;">0</div>
            </div>
        </div>
    </div>

    <div class="action-board">
        <div class="action-title" id="dynamic-action-title">⚠️ 상대팀이 지정한 미션 대기 중...</div>
        <div class="mission-list" id="game-mission-list"></div>
    </div>

    <div class="history-board">
        <div style="color: #f2a900; font-size: 1.1rem; text-align: center;">📅 데일리 매치 기록 집계판 (날마다 자동 리셋)</div>
        <table class="history-table">
            <thead>
                <tr>
                    <th>날짜</th>
                    <th style="color:#ff6b35;">삼구삼진스</th>
                    <th style="color:#0077b6;">코스 라이언즈</th>
                    <th>우승 팀</th>
                </tr>
            </thead>
            <tbody id="history-tbody">
                <tr><td colspan="4" style="color:#777;">불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="log-container">
        <div id="log-feed"></div>
    </div>

<script>
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/";

    const myTeam = localStorage.getItem('baseball_team'); 
    const myTeamName = localStorage.getItem('baseball_team_name');
    const myPlayer = localStorage.getItem('baseball_player');

    // 오늘 날짜 문자열
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('today-board-title').innerText = `COS 253 BASEBALL BOARD [${todayStr}]`;

    if (!myTeam || !myPlayer) window.location.href = 'index.html';

    document.getElementById('user-team-display').innerText = myTeamName;
    document.getElementById('user-player-display').innerText = `[${myPlayer}]`;

    let serverMissions = [];
    let clearedMissions = [];

    function syncGameData() {
        // 1. 💡 오늘 날짜 디렉토리에서 점수 가져오기 (매일 0점으로 자동 리셋 효과)
        fetch(`${FIREBASE_URL}daily_scores/${todayStr}.json`).then(res => res.json()).then(data => {
            document.getElementById('score-A').innerText = (data && data.A !== undefined) ? data.A : 0;
            document.getElementById('score-B').innerText = (data && data.B !== undefined) ? data.B : 0;
        });

        // 2. 오늘 날짜의 미션 리스트 실시간 조회
        fetch(`${FIREBASE_URL}daily_missions/${todayStr}/${myTeam}.json`).then(res => res.json()).then(data => {
            const listContainer = document.getElementById('game-mission-list');
            const titleEl = document.getElementById('dynamic-action-title');

            if (!data || !data.list || data.list.length === 0) {
                titleEl.innerText = "⏳ 상대 팀 첫 출근자가 미션을 선택할 때까지 대기 중입니다...";
                listContainer.innerHTML = "";
                return;
            }

            titleEl.innerText = `💣 상대팀이 던진 미션 리스트 (격파 시 누적 점수 증가!)`;
            serverMissions = data.list;
            
            // 오늘 내가 클리어한 미션 내역 로드
            fetch(`${FIREBASE_URL}daily_cleared/${todayStr}/${myTeam}/${myPlayer}.json`).then(res => res.json()).then(cData => {
                clearedMissions = cData ? Object.values(cData) : [];
                
                listContainer.innerHTML = "";
                const currentClearCount = clearedMissions.length;

                serverMissions.forEach((mission) => {
                    const btn = document.createElement('button');
                    btn.className = "mission-btn";
                    
                    const isCleared = clearedMissions.includes(mission);
                    if(isCleared) {
                        btn.classList.add('cleared');
                        btn.innerHTML = `<span>✅ 완료: ${mission}</span>`;
                    } else {
                        let nextScoreTip = "";
                        if(currentClearCount === 0) nextScoreTip = "1루타 (+1)";
                        else if(currentClearCount === 1) nextScoreTip = "2루타 (+2)";
                        else if(currentClearCount === 2) nextScoreTip = "3루타 (+3)";
                        else if(currentClearCount === 3) nextScoreTip = "홈런 (+4)";
                        else if(currentClearCount === 4) nextScoreTip = "2점홈런 🎉 (+4)";

                        btn.innerHTML = `<span>🎯 미션: ${mission}</span> <b style="color:#ff4d4d;">성공 시 ${nextScoreTip}</b>`;
                        btn.onclick = () => clearTargetMission(mission, currentClearCount + 1);
                    }
                    listContainer.appendChild(btn);
                });
            });
        });

        // 3. 📅 전체 일별 집계판 목록 바인딩
        fetch(`${FIREBASE_URL}daily_scores.json`).then(res => res.json()).then(allScores => {
            const tbody = document.getElementById('history-tbody');
            if(!allScores) {
                tbody.innerHTML = `<tr><td colspan="4" style="color:#777;">아직 진행된 매치 기록이 없습니다.</td></tr>`;
                return;
            }
            tbody.innerHTML = "";
            // 날짜 최신순 정렬
            Object.keys(allScores).sort().reverse().forEach(dateKey => {
                const dayData = allScores[dateKey];
                const scoreA = dayData.A || 0;
                const scoreB = dayData.B || 0;
                
                let winnerText = "무승부 🤝";
                if(scoreA > scoreB) winnerText = "🏆 삼구삼진스";
                else if(scoreB > scoreA) winnerText = "🏆 코스 라이언즈";

                const tr = document.createElement('tr');
                if(dateKey === todayStr) tr.style.backgroundColor = "rgba(0, 188, 212, 0.15)"; // 오늘 날짜 하이라이트
                tr.innerHTML = `
                    <td>${dateKey} ${dateKey === todayStr ? '(오늘)' : ''}</td>
                    <td style="color:#ff6b35; font-weight:bold;">${scoreA} 점</td>
                    <td style="color:#0077b6; font-weight:bold;">${scoreB} 점</td>
                    <td style="color:#f2a900;">${winnerText}</td>
                `;
                tbody.appendChild(tr);
            });
        });

        // 4. 중계 리포트 피드 갱신
        fetch(`${FIREBASE_URL}logs.json?orderBy="$key"&limitToLast=10`).then(res => res.json()).then(data => {
            const feed = document.getElementById('log-feed');
            if(!data) return;
            feed.innerHTML = "";
            Object.keys(data).reverse().forEach(key => {
                const log = data[key];
                const div = document.createElement('div');
                div.className = "log-item";
                div.innerHTML = `⏱️ [${log.time}] <b>${log.teamName}</b> ${log.player} ➡️ ${log.hitText}`;
                feed.appendChild(div);
            });
        });
    }

    function clearTargetMission(missionName, nextStep) {
        let hitText = "";
        let points = 0;

        if (nextStep === 1) { hitText = "1구째 미션 격파! 1루타 안타!"; points = 1; }
        else if (nextStep === 2) { hitText = "2구째 미션 격파! 우중간 가르는 2루타!!"; points = 2; }
        else if (nextStep === 3) { hitText = "3구째 미션 격파! 펜스 대형 3루타!!!"; points = 3; }
        else if (nextStep === 4) { hitText = "4구째 미션 격파! 대형 솔로 홈런 짜릿하게 작렬!!!"; points = 4; }
        else if (nextStep === 5) { hitText = "🔥 5개 미션 올클리어 완료!! 백투백 2점 홈런!!! [보너스 코스머니 +1,000원]"; points = 4; }

        if(!confirm(`[${missionName}] 미션을 달성하여 타격을 날릴까요?`)) return;

        // 오늘 날짜 경로에 클리어 내역 등록
        fetch(`${FIREBASE_URL}daily_cleared/${todayStr}/${myTeam}/${myPlayer}.json`, {
            method: 'POST',
            body: JSON.stringify(missionName)
        })
        .then(() => {
            // 오늘 날짜의 기존 팀 스코어 가져오기
            return fetch(`${FIREBASE_URL}daily_scores/${todayStr}/${myTeam}.json`).then(res => res.json());
        })
        .then((currentScore) => {
            const scoreNum = currentScore ? parseInt(currentScore) : 0;
            const newScore = scoreNum + points;

            return fetch(`${FIREBASE_URL}daily_scores/${todayStr}/${myTeam}.json`, {
                method: 'PUT',
                body: JSON.stringify(newScore)
            });
        })
        .then(() => {
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            
            const logData = {
                team: myTeam,
                teamName: myTeamName,
                player: myPlayer,
                hitText: hitText,
                time: timeStr
            };

            return fetch(`${FIREBASE_URL}logs.json`, { method: 'POST', body: JSON.stringify(logData) });
        })
        .then(() => {
            syncGameData();
            if(nextStep === 5) {
                alert("🎉 축하합니다! 모든 미션을 전부 격파하여 2점 홈런과 함께 [보너스 코스머니 +1,000원]을 획득했습니다!");
            }
        });
    }

    setInterval(syncGameData, 3000);
    window.onload = syncGameData;
</script>
</body>
</html>

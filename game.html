<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>253 BASEBALL - TEAM MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700&family=Black+Han+Sans&display=swap');
        body {
            margin: 0; padding: 0; background-color: #0b0e14; color: #ffffff;
            font-family: 'Black Han Sans', sans-serif; display: flex; flex-direction: column;
            align-items: center; min-height: 100vh; padding: 12px; box-sizing: border-box;
        }
        .user-bar {
            width: 100%; max-width: 450px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.9); padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #f2a900;
        }
        .stadium-container {
            width: 100%; max-width: 450px; aspect-ratio: 3 / 2; background-image: url('stadium.png');
            background-repeat: no-repeat; background-position: center center; background-size: 100% 100%;
            border: 3px solid #00bcd4; border-radius: 12px; position: relative; margin-bottom: 12px; overflow: hidden;
        }
        .base-runner {
            position: absolute; width: 14px; height: 14px; background-color: #fffb00; border-radius: 50%; z-index: 99;
            transform: translate(-50%, -50%); display: none; box-shadow: 0 0 10px #fffb00, 0 0 20px #ffea00;
            animation: arcade-blink 0.6s infinite alternate; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes arcade-blink { 0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.8); } 100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } }
        
        .scoreboard { width: 100%; max-width: 450px; background: rgba(17, 21, 28, 0.95); border: 2px solid #f2a900; border-radius: 12px; padding: 12px; box-sizing: border-box; margin-bottom: 12px; }
        .board-header { text-align: center; font-family: 'Orbitron', sans-serif; color: #f2a900; font-size: 1.0rem; margin-bottom: 8px; border-bottom: 1px dashed #444; padding-bottom: 4px; }
        .team-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 8px 14px; border-radius: 8px; margin-top: 5px; }
        .board-score { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; }
        
        .action-board { width: 100%; max-width: 450px; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff4d4d; border-radius: 12px; padding: 14px; box-sizing: border-box; margin-bottom: 12px; }
        .action-title { font-size: 1.05rem; color: #ff4d4d; margin-bottom: 10px; text-align: center; line-height:1.4; }
        .mission-list { display: flex; flex-direction: column; gap: 8px; }
        .mission-btn {
            width: 100%; padding: 14px 12px; font-family: 'Black Han Sans', sans-serif; font-size: 0.9rem;
            border: 2px solid #444; border-radius: 8px; background: #1e222b; color: #fff; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; text-align: left;
        }
        .mission-btn.cleared { background: #111; color: #444; border-color: #222; text-decoration: line-through; pointer-events: none; }
        
        /* 특수 NOR 미션 강조 디자인 */
        .nor-mission { border-color: #f2a900; background: rgba(242, 169, 0, 0.1); }
        
        .log-container { width: 100%; max-width: 450px; background: rgba(0, 0, 0, 0.9); border: 1px solid #222; border-radius: 8px; padding: 8px; max-height: 80px; overflow-y: auto; }
        .log-item { padding: 4px 0; font-size: 0.8rem; border-bottom: 1px dashed #222; color: #aaa; }
    </style>
</head>
<body>

    <div class="user-bar">
        <div><span id="user-team-display" style="color:#f2a900;"></span> <span id="user-player-display" style="color: #00bcd4;"></span> 타석</div>
        <button style="background:#ff4d4d; border:none; color:white; padding:5px 10px; border-radius:6px; font-size:0.8rem;" onclick="location.href='index.html'">퇴장</button>
    </div>

    <div class="stadium-container" id="stadium-map">
        <div class="base-runner" id="runner-1" style="top: 69%; left: 71%;"></div>
        <div class="base-runner" id="runner-2" style="top: 56%; left: 50%;"></div>
        <div class="base-runner" id="runner-3" style="top: 69%; left: 29%;"></div>
    </div>

    <div class="scoreboard">
        <div class="board-header" id="today-board-title">TEAM REAL BASEBALL</div>
        <div class="team-row" style="border-left: 5px solid #ff6b35;">
            <div>⚾ 삼구삼진스</div><div class="board-score" id="score-A" style="color:#ff6b35;">0</div>
        </div>
        <div class="team-row" style="border-left: 5px solid #0077b6;">
            <div>🦁 코스 라이언즈</div><div class="board-score" id="score-B" style="color:#0077b6;">0</div>
        </div>
    </div>

    <div class="action-board">
        <div class="action-title" id="dynamic-action-title">⚠️ 통신 중...</div>
        <div class="mission-list" id="game-mission-list"></div>
    </div>

    <div class="log-container"><div id="log-feed"></div></div>

<script>
    const FIREBASE_URL = "https://cos253baseball-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const myTeam = localStorage.getItem('baseball_team'); 
    const myTeamName = localStorage.getItem('baseball_team_name');
    const myPlayer = localStorage.getItem('baseball_player');
    const todayStr = new Date().toISOString().split('T')[0];

    if (!myTeam || !myPlayer) window.location.href = 'index.html';

    document.getElementById('user-team-display').innerText = myTeamName.split(' ')[1] || myTeamName;
    document.getElementById('user-player-display').innerText = `[${myPlayer}]`;

    // 🗓️ 오늘 요일에 따른 NOR Goal 자동 계산
    function getDailyNorGoal() {
        const day = new Date().getDay(); 
        if (day === 5) return 60; // 금
        if (day === 6) return 80; // 토
        if (day === 0) return 65; // 일
        return 55; // 월~목
    }

    function syncGameData() {
        // 1. 점수 및 루상 상태 동기화
        fetch(`${FIREBASE_URL}team_status/${todayStr}.json`).then(res => res.json()).then(data => {
            const scoreA = (data && data.A) ? data.A.score : 0;
            const scoreB = (data && data.B) ? data.B.score : 0;
            document.getElementById('score-A').innerText = scoreA;
            document.getElementById('score-B').innerText = scoreB;

            const myTeamData = (data && data[myTeam]) ? data[myTeam] : { bases: [0, 0, 0] };
            const bases = myTeamData.bases || [0, 0, 0];
            
            document.getElementById('runner-1').style.display = bases[0] === 1 ? 'block' : 'none';
            document.getElementById('runner-2').style.display = bases[1] === 1 ? 'block' : 'none';
            document.getElementById('runner-3').style.display = bases[2] === 1 ? 'block' : 'none';
        });

        // 2. 미션 리스트 렌더링 (순서 분리)
        fetch(`${FIREBASE_URL}daily_missions/${todayStr}/${myTeam}.json`).then(res => res.json()).then(data => {
            fetch(`${FIREBASE_URL}daily_cleared/${todayStr}/${myTeam}/${myPlayer}.json`).then(res => res.json()).then(cData => {
                const listContainer = document.getElementById('game-mission-list');
                const titleEl = document.getElementById('dynamic-action-title');
                
                const clearedMissions = cData ? Object.values(cData) : [];
                const myCurrentHits = clearedMissions.length;

                // 항상 화면 초기화
                listContainer.innerHTML = "";

                // 🌟 [핵심 변경] 상대팀 미션 지정 여부와 상관없이 NOR Goal은 무조건 먼저 그립니다!
                const currentNorGoal = getDailyNorGoal();
                const norMissionName = `[데일리 팀 목표] NOR Goal ${currentNorGoal}개 달성`;
                const norBtn = document.createElement('button');
                norBtn.className = "mission-btn nor-mission";
                
                if(clearedMissions.includes(norMissionName)) {
                    norBtn.classList.add('cleared');
                    norBtn.innerHTML = `<span>✅ 완료: ${norMissionName}</span>`;
                } else {
                    norBtn.innerHTML = `<span>🌟 ${norMissionName}</span> <span style="color:#f2a900; font-size:0.85rem; flex-shrink:0; text-align:right;">👉 💥 팀 홈런!</span>`;
                    norBtn.onclick = () => clearRealBaseballMission(norMissionName, 4);
                }
                listContainer.appendChild(norBtn);

                // ⚔️ 그 다음, 상대팀이 미션을 던졌는지 확인
                if (!data || !data.list) {
                    titleEl.innerHTML = "⏳ 상대팀 미션 투구 대기 중...<br><span style='font-size:0.8rem; color:#aaa;'>(위에 있는 데일리 팀 목표는 먼저 진행 가능합니다)</span>";
                    return; // 상대팀 미션이 없으면 여기서 스톱!
                }

                // 상대팀이 미션을 던졌다면 제목을 바꾸고 나머지 6개 미션을 아래에 붙입니다.
                titleEl.innerText = `💣 현재 내 진루권 미션판`;

                data.list.forEach((mission) => {
                    const btn = document.createElement('button');
                    btn.className = "mission-btn";
                    
                    if(clearedMissions.includes(mission)) {
                        btn.classList.add('cleared');
                        btn.innerHTML = `<span>✅ 완료: ${mission}</span>`;
                    } else {
                        let hitTypeTip = "";
                        let nextHits = myCurrentHits + 1; // 클리어한 횟수에 따라 진루 칸수 증가
                        if(nextHits === 1) hitTypeTip = "1루타 안타! ⚾";
                        else if(nextHits === 2) hitTypeTip = "2루타!! ⚾⚾";
                        else if(nextHits === 3) hitTypeTip = "3루타!!! ⚾⚾⚾";
                        else if(nextHits === 4) hitTypeTip = "💥 솔로 홈런!!!";
                        else if(nextHits >= 5) hitTypeTip = "🚀 백투백 홈런!!!";

                        btn.innerHTML = `<span>🎯 ${mission}</span> <span style="color:#ff4d4d; font-size:0.85rem; flex-shrink:0; text-align:right;">👉 ${hitTypeTip}</span>`;
                        btn.onclick = () => clearRealBaseballMission(mission, nextHits);
                    }
                    listContainer.appendChild(btn);
                });
            });
        });

        // 3. 로그 피드 동기화
        fetch(`${FIREBASE_URL}logs.json?orderBy="$key"&limitToLast=5`).then(res => res.json()).then(data => {
            const feed = document.getElementById('log-feed');
            if(!data) return;
            feed.innerHTML = "";
            Object.keys(data).reverse().forEach(key => {
                const log = data[key];
                const div = document.createElement('div');
                div.className = "log-item";
                div.innerHTML = `⏱️[${log.time}] <b>${log.player}</b>: ${log.hitText}`;
                feed.appendChild(div);
            });
        });
    }

    function clearRealBaseballMission(missionName, hitType) {
        let hitLogText = "";
        let hits = hitType > 4 ? 4 : hitType; 

        if (missionName.includes('NOR Goal')) hitLogText = "🌟 데일리 목표 달성! 팀 특별 홈런 작렬!!!!";
        else if (hits === 1) hitLogText = "안타 가동! 1루타!";
        else if (hits === 2) hitLogText = "장타 폭발! 2루타!!";
        else if (hits === 3) hitLogText = "펜스 직격! 3루타!!!";
        else if (hitType === 4) hitLogText = "💥 대형 홈런 작렬!!!!";
        else if (hitType >= 5) hitLogText = "🚀 연속 타석 백투백 홈런!!!!";

        if(!confirm(`정말 미션을 클리어하셨습니까?`)) return;

        fetch(`${FIREBASE_URL}team_status/${todayStr}/${myTeam}.json`).then(res => res.json()).then(data => {
            let status = data || { bases: [0, 0, 0], score: 0 };
            let currentBases = status.bases || [0, 0, 0];
            let currentScore = status.score || 0;
            let nextBases = [0, 0, 0];
            let earnedPoints = 0;

            if (hits === 4) {
                earnedPoints = currentBases[0] + currentBases[1] + currentBases[2] + 1;
                nextBases = [0, 0, 0]; 
            } else {
                for (let b = 2; b >= 0; b--) {
                    if (currentBases[b] === 1) {
                        if (b + hits >= 3) { earnedPoints++; } 
                        else { nextBases[b + hits] = 1; }
                    }
                }
                nextBases[hits - 1] = 1;
            }

            currentScore += earnedPoints;
            if(earnedPoints > 0) hitLogText += ` (주자 홈인! +${earnedPoints}점)`;

            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            fetch(`${FIREBASE_URL}team_status/${todayStr}/${myTeam}.json`, {
                method: 'PUT', body: JSON.stringify({ bases: nextBases, score: currentScore })
            })
            .then(() => fetch(`${FIREBASE_URL}daily_cleared/${todayStr}/${myTeam}/${myPlayer}.json`, {
                method: 'POST', body: JSON.stringify(missionName)
            }))
            .then(() => fetch(`${FIREBASE_URL}logs.json`, {
                method: 'POST', body: JSON.stringify({ player: myPlayer, hitText: hitLogText, time: timeStr })
            }))
            .then(() => syncGameData());
        });
    }

    setInterval(syncGameData, 3000);
    window.onload = syncGameData;
</script>
</body>
</html>
